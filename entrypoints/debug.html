<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ocbot Debug</title>
  <style>
    :root {
      --bg: #0a0a0b;
      --bg-muted: #18181b;
      --border: #27272a;
      --fg: #fafafa;
      --fg-muted: #a1a1aa;
      --primary: #3b82f6;
      --primary-fg: #fff;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --purple: #9333ea;
      --orange: #ea580c;
      --teal: #0d9488;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); }

    /* Layout */
    #app { display: flex; flex-direction: column; height: 100vh; }
    .header { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .header svg { width: 20px; height: 20px; color: var(--primary); }
    .header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }

    /* Controls */
    .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .controls .spacer { flex: 1; }
    .divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: none; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .btn-primary { background: var(--primary); color: var(--primary-fg); }
    .btn-primary:hover { opacity: 0.9; }
    .btn-green { background: var(--green); color: #fff; }
    .btn-green:hover { opacity: 0.9; }
    .btn-green:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-muted { background: var(--bg-muted); color: var(--fg-muted); border: 1px solid var(--border); }
    .btn-muted:hover { color: var(--fg); }
    .btn-accent { background: var(--bg-muted); color: var(--fg); border: 1px solid var(--border); }
    .btn-accent:hover { background: #222; }

    select { padding: 6px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--fg); font-size: 12px; }

    /* Event Log */
    #log { flex: 1; overflow-y: auto; position: relative; }
    #log-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--fg-muted); font-size: 14px; }
    .event-row { padding: 4px 12px; border-bottom: 1px solid #ffffff08; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; display: flex; align-items: flex-start; gap: 8px; cursor: default; }
    .event-row:hover { background: #ffffff06; }
    .event-ts { color: var(--fg-muted); white-space: nowrap; }
    .event-cat { font-weight: 600; white-space: nowrap; }
    .event-msg { flex: 1; color: var(--fg); }
    .event-expand { color: var(--fg-muted); cursor: pointer; font-size: 10px; user-select: none; }
    .event-data { margin: 4px 0 4px 100px; padding: 6px 10px; background: var(--bg-muted); border-radius: 6px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: var(--fg-muted); white-space: pre-wrap; word-break: break-all; display: none; }
    .event-data.open { display: block; }

    /* Category colors */
    .cat-L1 { color: #60a5fa; } .row-L1 { background: rgba(59,130,246,0.04); }
    .cat-L2 { color: #fbbf24; } .row-L2 { background: rgba(217,119,6,0.04); }
    .cat-L3 { color: #f87171; } .row-L3 { background: rgba(220,38,38,0.04); }
    .cat-diff { color: #c084fc; } .row-diff { background: rgba(147,51,234,0.04); }
    .cat-selector { color: #4ade80; } .row-selector { background: rgba(34,197,94,0.04); }
    .cat-execution { color: #a1a1aa; } .row-execution { background: transparent; }
    .cat-fragility { color: #fb923c; } .row-fragility { background: rgba(234,88,12,0.04); }

    /* Scroll-to-bottom */
    #scroll-btn { display: none; position: sticky; bottom: 12px; margin: 0 auto; padding: 4px 14px; border-radius: 20px; background: var(--primary); color: #fff; border: none; font-size: 11px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

    /* Inspector */
    .inspector-toggle { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 8px 16px; border: none; background: none; color: var(--fg-muted); font-size: 12px; font-weight: 500; cursor: pointer; border-top: 1px solid var(--border); }
    .inspector-toggle:hover { color: var(--fg); }
    #inspector-body { display: none; padding: 12px 16px; border-top: 1px solid #ffffff08; font-size: 12px; color: var(--fg-muted); line-height: 1.8; }
    #inspector-body.open { display: block; }
    #inspector-body .val { color: var(--fg); }
    #inspector-body .fragile { color: var(--orange); }
    .inspector-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .inspector-header span { font-weight: 500; color: var(--fg); }
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 2l1.88 1.88M14.12 3.88 16 2M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/>
      <path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"/>
      <path d="M12 20v2"/>
    </svg>
    <h1>ocbot Debug</h1>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-primary" onclick="openTestPage()">Open Test Page</button>
    <button class="btn btn-accent" onclick="createTestSkill()">+ Create Test Skill</button>
    <div class="divider"></div>
    <select id="skill-select"><option value="">No skills</option></select>
    <button class="btn btn-green" id="run-btn" onclick="runSkill()" disabled>Run Skill</button>
    <div class="spacer"></div>
    <button class="btn btn-muted" onclick="clearLog()">Clear Log</button>
  </div>

  <!-- Event Log -->
  <div id="log">
    <div id="log-empty">No debug events yet. Run a skill to see events here.</div>
  </div>
  <button id="scroll-btn" onclick="scrollToBottom()">Scroll to bottom</button>

  <!-- Inspector -->
  <button class="inspector-toggle" onclick="toggleInspector()">
    <span>State Inspector</span>
    <span id="inspector-arrow">&#9650;</span>
  </button>
  <div id="inspector-body">
    <div class="inspector-header">
      <span>Inspector</span>
      <button class="btn btn-muted" onclick="refreshSkills()" style="padding:3px 8px;">Refresh</button>
    </div>
    <div id="inspector-content">Loading...</div>
  </div>
</div>

<script>
  // === Storage keys (must match eventLog.ts) ===
  const EVENTS_KEY = 'ocbot_debug_events'
  const SKILLS_KEY = 'ocbot_skills'

  let autoScroll = true
  let inspectorOpen = false
  let skills = []
  let selectedSkillId = ''

  // === Event Log ===
  function formatTime(ts) {
    const d = new Date(ts)
    return d.toLocaleTimeString('en-US', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0')
  }

  function renderEvents(events) {
    const log = document.getElementById('log')
    const empty = document.getElementById('log-empty')

    if (!events || events.length === 0) {
      log.innerHTML = ''
      log.appendChild(empty)
      empty.style.display = 'flex'
      return
    }

    empty.style.display = 'none'
    log.innerHTML = ''

    for (const ev of events) {
      const row = document.createElement('div')
      row.className = `event-row row-${ev.cat}`

      const hasData = ev.data !== undefined && ev.data !== null
      const dataId = `data-${ev.id}`

      row.innerHTML = `
        <span class="event-ts">[${formatTime(ev.ts)}]</span>
        <span class="event-cat cat-${ev.cat}">[${ev.cat}]</span>
        <span class="event-msg">${escapeHtml(ev.msg)}</span>
        ${hasData ? `<span class="event-expand" onclick="toggleData('${dataId}', event)">&#9660;</span>` : ''}
      `
      log.appendChild(row)

      if (hasData) {
        const dataEl = document.createElement('div')
        dataEl.className = 'event-data'
        dataEl.id = dataId
        dataEl.textContent = JSON.stringify(ev.data, null, 2)
        log.appendChild(dataEl)
      }
    }

    log.appendChild(document.getElementById('scroll-btn'))

    if (autoScroll) {
      log.scrollTop = log.scrollHeight
    }
  }

  function escapeHtml(s) {
    const d = document.createElement('div')
    d.textContent = s
    return d.innerHTML
  }

  function toggleData(id, e) {
    e.stopPropagation()
    const el = document.getElementById(id)
    if (el) el.classList.toggle('open')
  }

  // Scroll handling
  document.getElementById('log').addEventListener('scroll', function () {
    const el = this
    const atBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 40
    autoScroll = atBottom
    document.getElementById('scroll-btn').style.display = atBottom ? 'none' : 'block'
  })

  function scrollToBottom() {
    const log = document.getElementById('log')
    log.scrollTop = log.scrollHeight
    autoScroll = true
    document.getElementById('scroll-btn').style.display = 'none'
  }

  // === Chrome Storage Integration ===
  function loadEvents() {
    chrome.storage.session.get(EVENTS_KEY, (result) => {
      renderEvents(result[EVENTS_KEY] || [])
    })
  }

  chrome.storage.session.onChanged.addListener((changes) => {
    if (changes[EVENTS_KEY]) {
      renderEvents(changes[EVENTS_KEY].newValue || [])
    }
  })

  function clearLog() {
    chrome.storage.session.remove(EVENTS_KEY, () => {
      renderEvents([])
    })
  }

  // === Skills ===
  function refreshSkills() {
    chrome.storage.local.get(SKILLS_KEY, (result) => {
      const all = result[SKILLS_KEY] || {}
      skills = Object.values(all).sort((a, b) => b.updatedAt - a.updatedAt)

      const sel = document.getElementById('skill-select')
      sel.innerHTML = ''

      if (skills.length === 0) {
        sel.innerHTML = '<option value="">No skills</option>'
        document.getElementById('run-btn').disabled = true
        selectedSkillId = ''
      } else {
        for (const s of skills) {
          const opt = document.createElement('option')
          opt.value = s.id
          opt.textContent = `${s.name} (v${s.version})`
          sel.appendChild(opt)
        }
        if (!selectedSkillId || !skills.find(s => s.id === selectedSkillId)) {
          selectedSkillId = skills[0].id
        }
        sel.value = selectedSkillId
        document.getElementById('run-btn').disabled = false
      }

      renderInspector()
    })
  }

  document.getElementById('skill-select').addEventListener('change', function () {
    selectedSkillId = this.value
    document.getElementById('run-btn').disabled = !selectedSkillId
    renderInspector()
  })

  function renderInspector() {
    const el = document.getElementById('inspector-content')
    const skill = skills.find(s => s.id === selectedSkillId)

    let html = `<div>Skills: <span class="val">${skills.length}</span></div>`

    if (skill) {
      html += `<div>Selected: <span class="val">${escapeHtml(skill.name)}</span> — v${skill.version} — ${skill.status} — score: ${(skill.score * 100).toFixed(0)}%</div>`
      html += `<div>Runs: ${skill.totalRuns} (${skill.successCount} success) — Steps: ${skill.steps ? skill.steps.length : 0}</div>`
      if (skill.fragileSteps && skill.fragileSteps.length > 0) {
        html += `<div>Fragile steps: <span class="fragile">[${skill.fragileSteps.join(', ')}]</span></div>`
      }
    }

    el.innerHTML = html
  }

  // === Actions ===
  function openTestPage() {
    chrome.tabs.create({ url: chrome.runtime.getURL('test-target.html') })
  }

  function createTestSkill() {
    const testPageUrl = chrome.runtime.getURL('test-target.html')
    const skill = {
      id: 'skill_test_' + Date.now(),
      name: 'Debug Test Skill',
      description: 'Test skill targeting test-target page elements',
      version: 1,
      categories: ['Debug'],
      parameters: [],
      author: 'ocbot-debug',
      createdAt: Date.now(),
      updatedAt: Date.now(),
      skillMd: 'Navigate to the test target page. Click the "Click Me" button. Type "hello world" in the text input.',
      steps: [
        { type: 'navigate', url: testPageUrl },
        { type: 'act', instruction: 'Click the "Click Me" button', actions: [] },
        { type: 'act', instruction: 'Type "hello world" in the text input', actions: [] },
      ],
      startUrl: testPageUrl,
      score: 1,
      status: 'active',
      totalRuns: 0,
      successCount: 0,
    }

    chrome.storage.local.get(SKILLS_KEY, (result) => {
      const all = result[SKILLS_KEY] || {}
      all[skill.id] = skill
      chrome.storage.local.set({ [SKILLS_KEY]: all }, () => {
        selectedSkillId = skill.id
        refreshSkills()
      })
    })
  }

  async function runSkill() {
    if (!selectedSkillId) return
    await chrome.storage.local.set({ ocbot_run_skill: selectedSkillId })
    const { id: windowId } = await chrome.windows.getCurrent()
    await chrome.sidePanel.open({ windowId })
  }

  // === Inspector toggle ===
  function toggleInspector() {
    inspectorOpen = !inspectorOpen
    document.getElementById('inspector-body').classList.toggle('open', inspectorOpen)
    document.getElementById('inspector-arrow').innerHTML = inspectorOpen ? '&#9660;' : '&#9650;'
    if (inspectorOpen) renderInspector()
  }

  // === Init ===
  loadEvents()
  refreshSkills()
</script>
</body>
</html>
